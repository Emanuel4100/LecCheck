name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (for Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Create .env from secrets
        working-directory: flutter_app
        run: |
          cat > .env << EOF
          LINUX_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.LINUX_GOOGLE_OAUTH_CLIENT_ID }}
          LINUX_GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.LINUX_GOOGLE_OAUTH_CLIENT_SECRET }}
          EOF

      - name: Parse version info
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"               # e.g. v0.8.0
          SEMVER="${TAG#v}"                        # e.g. 0.8.0
          RAW="$(grep -E '^version:' flutter_app/pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//' | tr -d '\r')"
          BUILD="${RAW#*+}"
          FILE_VER="${SEMVER}-${BUILD}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "file_ver=${FILE_VER}" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        working-directory: flutter_app
        run: flutter build apk --release --dart-define-from-file=.env

      - name: Build Linux bundle
        working-directory: flutter_app
        run: flutter build linux --release --dart-define-from-file=.env

      - name: Package Linux bundle
        run: |
          BUNDLE="flutter_app/build/linux/x64/release/bundle"
          APP_ID="com.leccheck.app"

          # Copy icons into bundle
          mkdir -p "${BUNDLE}/data/icons"
          for SIZE in 64 128 256 512; do
            SRC="flutter_app/linux/assets/${APP_ID}-${SIZE}.png"
            if [ -f "${SRC}" ]; then
              cp "${SRC}" "${BUNDLE}/data/icons/${APP_ID}-${SIZE}.png"
            fi
          done

          cp scripts/linux-setup-template.sh "${BUNDLE}/setup.sh"
          chmod +x "${BUNDLE}/setup.sh"

          tar -C flutter_app/build/linux/x64/release \
            -czf "leccheck-linux-x64-${{ steps.version.outputs.file_ver }}.tar.gz" \
            bundle

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp "flutter_app/build/app/outputs/flutter-apk/app-release.apk" \
             "release-artifacts/leccheck-android-${{ steps.version.outputs.file_ver }}.apk"
          cp "leccheck-linux-x64-${{ steps.version.outputs.file_ver }}.tar.gz" \
             "release-artifacts/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LecCheck ${{ steps.version.outputs.tag }}
          body: |
            ## LecCheck ${{ steps.version.outputs.tag }}

            ### Downloads
            - **Android**: `leccheck-android-${{ steps.version.outputs.file_ver }}.apk`
            - **Linux**: `leccheck-linux-x64-${{ steps.version.outputs.file_ver }}.tar.gz` — extract and run `./setup.sh`
          files: release-artifacts/*
          generate_release_notes: true
